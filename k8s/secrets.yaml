# ── ShitMarket Secrets Template ─────────────────────────────────
# Apply with:
#   kubectl create secret generic shitmarket-secrets \
#     --namespace shitmarket \
#     --from-literal=db-password='<change-me>' \
#     --from-literal=redis-password='<change-me>' \
#     --from-literal=solana-private-key='<change-me>' \
#     --from-literal=sentry-dsn='<change-me>' \
#     --from-literal=slack-webhook='<change-me>' \
#     --from-literal=pagerduty-key='<change-me>' \
#     --from-literal=dex-screener-api-key='<change-me>' \
#     --from-literal=birdeye-api-key='<change-me>'
#
# Or use external secrets operator for production.
#
# This file is for documentation only — DO NOT commit real secrets.
---
apiVersion: v1
kind: Secret
metadata:
  name: shitmarket-secrets
  namespace: shitmarket
  labels:
    app: shitmarket
type: Opaque
stringData:
  db-password: "<change-me>"
  redis-password: "<change-me>"
  solana-private-key: "<change-me>"
  sentry-dsn: "<change-me>"
  slack-webhook: "<change-me>"
  pagerduty-key: "<change-me>"
  dex-screener-api-key: "<change-me>"
  birdeye-api-key: "<change-me>"
  jupiter-api-key: "<change-me>"
---
