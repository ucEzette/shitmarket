name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  ANCHOR_VERSION: "0.30.1"
  SOLANA_CLI_VERSION: "1.18.26"
  NODE_VERSION: "20"

jobs:
  # ─── Lint & Type-Check (Indexer) ─────────────────────────────────────────────
  indexer-lint:
    name: Indexer — lint + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: indexer
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shitmarket
          POSTGRES_PASSWORD: shitmarket
          POSTGRES_DB: shitmarket_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: indexer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://shitmarket:shitmarket@localhost:5432/shitmarket_ci

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://shitmarket:shitmarket@localhost:5432/shitmarket_ci

      - name: TypeScript check
        run: npx tsc --noEmit
        env:
          DATABASE_URL: postgresql://shitmarket:shitmarket@localhost:5432/shitmarket_ci
          PROGRAM_ID: GxkRWMoyKpKkTadmGqqqLvA473YTwvDUeSPK1iS8REim
          KEEPER_PRIVATE_KEY: "[1,2,3]"

      - name: Lint
        run: npx eslint . --ext .ts --max-warnings 0
        continue-on-error: true # Don't block on style, just report

  # ─── Anchor Build + Test ─────────────────────────────────────────────────────
  program-build:
    name: Program — build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: program
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: program/package-lock.json

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_CLI_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build program
        run: anchor build

      - name: Run tests
        run: anchor test --skip-deploy
        env:
          ANCHOR_WALLET: ${{ github.workspace }}/program/ci-test-keypair.json

  # ─── Next.js Frontend Build ──────────────────────────────────────────────────
  frontend-build:
    name: Frontend — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

  # ─── Docker Image Build (Indexer) ───────────────────────────────────────────
  docker-build:
    name: Docker — build indexer image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t shitmarket-indexer:ci -f indexer/Dockerfile indexer/
