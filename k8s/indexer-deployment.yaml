# ── Indexer Deployment ──────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: indexer
  namespace: shitmarket
  labels:
    app: indexer
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: indexer
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: indexer
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - indexer
                topologyKey: kubernetes.io/hostname
      containers:
        - name: indexer
          image: shitmarket/indexer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: api
            - containerPort: 3002
              name: ws
            - containerPort: 9090
              name: metrics
          envFrom:
            - configMapRef:
                name: shitmarket-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shitmarket-secrets
                  key: database-url
            - name: DATABASE_REPLICA_URL
              valueFrom:
                secretKeyRef:
                  name: shitmarket-secrets
                  key: database-replica-url
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shitmarket-secrets
                  key: redis-password
            - name: SOLANA_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: shitmarket-secrets
                  key: solana-private-key
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: shitmarket-secrets
                  key: sentry-dsn
            - name: SLACK_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: shitmarket-secrets
                  key: slack-webhook
            - name: PAGERDUTY_KEY
              valueFrom:
                secretKeyRef:
                  name: shitmarket-secrets
                  key: pagerduty-key
            - name: DEX_SCREENER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: shitmarket-secrets
                  key: dex-screener-api-key
            - name: BIRDEYE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: shitmarket-secrets
                  key: birdeye-api-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: indexer-service
  namespace: shitmarket
  labels:
    app: indexer
spec:
  selector:
    app: indexer
  ports:
    - name: api
      port: 3001
      targetPort: 3001
    - name: ws
      port: 3002
      targetPort: 3002
    - name: metrics
      port: 9090
      targetPort: 9090
---
