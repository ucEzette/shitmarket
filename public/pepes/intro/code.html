<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ShitMarket.lol | Loading Trenches...</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Staatliches&amp;family=JetBrains+Mono:wght@400;700&amp;family=Permanent+Marker&amp;display=swap" rel="stylesheet"/>
<style>
    :root {
      --neon-moon: #39ff14;
      --jeet-red: #ff073a;
      --trench-black: #0c1609;
      --mud-brown: #323c2d;
    }

    body {
      background-color: var(--trench-black);
      color: white;
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    /* Cinematic Vignette & Scanlines */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
      pointer-events: none;
      z-index: 50;
    }

    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 4px, 3px 100%;
      pointer-events: none;
      z-index: 51;
      opacity: 0.3;
      transition: opacity 0.1s;
    }

    .glitch-active {
      animation: glitch-effect 0.2s infinite;
      opacity: 0.6;
    }

    @keyframes glitch-effect {
      0% { transform: translate(0) skew(0deg); filter: hue-rotate(0deg); }
      20% { transform: translate(-2px, 2px) skew(2deg); filter: hue-rotate(90deg); }
      40% { transform: translate(2px, -2px) skew(-2deg); }
      60% { transform: translate(-2px, -2px) skew(1deg); }
      80% { transform: translate(2px, 2px) skew(-1deg); }
      100% { transform: translate(0) skew(0deg); }
    }

    /* Mascot Animation */
    .mascot-container {
      position: relative;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-20px) rotate(2deg); }
    }

    .mascot {
      width: 200px;
      height: 200px;
      filter: drop-shadow(0 0 20px var(--neon-moon));
    }

    /* Loading Bar - Stencil Style */
    .loading-track {
      width: 300px;
      height: 30px;
      background: #1a2418;
      border: 3px solid var(--mud-brown);
      position: relative;
      overflow: hidden;
      margin-top: 2rem;
    }

    .loading-bar {
      height: 100%;
      background: var(--neon-moon);
      width: 0%;
      box-shadow: 0 0 15px var(--neon-moon);
      transition: width 0.1s linear;
    }

    .loading-text {
      font-family: 'Staatliches', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.1em;
      color: var(--neon-moon);
      text-shadow: 0 0 10px var(--neon-moon);
      margin-top: 1rem;
    }

    /* Mortar Flash Effect */
    .flash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
    }

    .ghost-wojak {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80vh;
      opacity: 0;
      pointer-events: none;
      z-index: 99;
      filter: grayscale(1) contrast(2) brightness(1.5);
      mix-blend-mode: color-dodge;
      transition: opacity 0.1s;
    }

    @keyframes screenShake {
      0% { transform: translate(0, 0); }
      10% { transform: translate(-5px, -5px); }
      20% { transform: translate(5px, 5px); }
      30% { transform: translate(-5px, 5px); }
      40% { transform: translate(5px, -5px); }
      50% { transform: translate(-2px, -2px); }
      60% { transform: translate(2px, 2px); }
      100% { transform: translate(0, 0); }
    }

    .shake {
      animation: screenShake 0.4s ease-in-out;
    }

    /* Quote Bubbles */
    .quote {
      position: absolute;
      top: -60px;
      right: -80px;
      background: white;
      color: black;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-family: 'Permanent Marker', cursive;
      font-size: 1.2rem;
      transform: rotate(10deg);
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }

    .quote::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 20px;
      border-width: 10px 10px 0;
      border-style: solid;
      border-color: white transparent transparent;
    }

    /* Particles & Sprites */
    .coin {
      position: fixed;
      width: 20px;
      height: 20px;
      pointer-events: none;
      z-index: 10;
    }

    .pepe-sprite {
      position: fixed;
      bottom: -100px;
      width: 120px;
      z-index: 60;
      transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      filter: drop-shadow(0 0 5px var(--neon-moon));
    }

    .jeet-dust {
      position: fixed;
      color: var(--neon-moon);
      font-family: 'JetBrains Mono', monospace;
      font-weight: bold;
      font-size: 10px;
      pointer-events: none;
      z-index: 5;
      opacity: 0.4;
      white-space: nowrap;
    }

    .few-understand-sign {
      position: fixed;
      left: -300px;
      top: 20%;
      background: var(--neon-moon);
      color: black;
      font-family: 'Staatliches', sans-serif;
      padding: 10px 40px;
      transform: rotate(-5deg);
      box-shadow: 10px 10px 0 black;
      z-index: 70;
      transition: left 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    /* Radioactive Button */
    .radioactive-btn {
      position: relative;
      text-shadow: 0 0 10px var(--neon-moon);
      transition: all 0.2s;
    }
    .radioactive-btn:hover {
      transform: scale(1.1);
      filter: brightness(1.2);
    }
    .radioactive-btn::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 140%;
      height: 140%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, var(--neon-moon) 0%, transparent 70%);
      opacity: 0.3;
      z-index: -1;
      animation: pulse-glow 2s infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.2; }
      50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.4; }
    }
  </style>
</head>

<img alt="Pepe Trench" class="pepe-sprite" id="pepe-left" src="https://lh3.googleusercontent.com/aida/ADBb0ujxWJR0WRCa0I3B34k8OM0Sw6wUsQyYS7mWVhvEoGQpxjPS4RySKv1yUz_lkpEpX-Gm2lTdVLSjTxVeD5cu6tZqXm9N26hTPjckWQT2j5jpl8KndRzz-EWydURvz71-zQJWDMN8dxO0m5FOERtR9NMsE-oO7PRUrW0rhapk4SDQgGBOGut2crwUCm58sxjWqCE3lVd5Jy7MAZW6N1MhUaf6Kk5ZdSbXBx29F8J7OrHi_kUbwSESWjlRO9Zs" style="left: 5%;"/>
<img alt="Pepe Trench" class="pepe-sprite" id="pepe-right" src="https://lh3.googleusercontent.com/aida/ADBb0ujxWJR0WRCa0I3B34k8OM0Sw6wUsQyYS7mWVhvEoGQpxjPS4RySKv1yUz_lkpEpX-Gm2lTdVLSjTxVeD5cu6tZqXm9N26hTPjckWQT2j5jpl8KndRzz-EWydURvz71-zQJWDMN8dxO0m5FOERtR9NMsE-oO7PRUrW0rhapk4SDQgGBOGut2crwUCm58sxjWqCE3lVd5Jy7MAZW6N1MhUaf6Kk5ZdSbXBx29F8J7OrHi_kUbwSESWjlRO9Zs" style="right: 5%; transform: scaleX(-1);"/>
<div class="few-understand-sign" id="few-sign">FEW UNDERSTAND</div>

<div class="mt-8 flex gap-4">
<div class="px-3 py-1 border border-[#323c2d] text-[10px] text-gray-500">VERSION: DEGEN_BETA_V1</div>
<div class="px-3 py-1 border border-[#323c2d] text-[10px] text-gray-500">LATENCY: 420ms</div>
</div>

<script>
    const statusMessages = [
      "FORAGING FOR LIQUIDITY...",
      "BRIBING THE PEPE GENERALS...",
      "DUSTING OFF THE AMMO CRATES...",
      "CALIBRATING MOON TRAJECTORY...",
      "EVADING THE RUG-PULLS...",
      "HEATING UP THE NEON CIGAR...",
      "DEPLOYING SANDBAGS...",
      "FINALIZING DEGEN PROTOCOL..."
    ];

    const quotes = [
      "JEETS GONNA JEET.",
      "TO THE MOON!",
      "STAY IN THE TRENCH.",
      "WAGMI ANONS.",
      "BUY THE DIP.",
      "DIAMOND HANDS ONLY."
    ];

    function spawnDust() {
      const texts = ['JEET', 'MOON', 'HODL', 'LFG'];
      const dust = document.createElement('div');
      dust.className = 'jeet-dust';
      dust.innerText = texts[Math.floor(Math.random() * texts.length)];
      dust.style.left = Math.random() * 100 + 'vw';
      dust.style.top = Math.random() * 100 + 'vh';
      document.body.appendChild(dust);

      let x = 0;
      let y = 0;
      const speedX = (Math.random() - 0.5) * 2;
      const speedY = (Math.random() - 0.5) * 2;
      
      const anim = setInterval(() => {
        x += speedX;
        y += speedY;
        dust.style.transform = `translate(${x}px, ${y}px)`;
        if (Math.abs(x) > 200) {
          clearInterval(anim);
          dust.remove();
        }
      }, 50);
    }

    // Pre-spawn some dust
    for(let i=0; i<20; i++) spawnDust();
    setInterval(spawnDust, 2000);

    function startIntro() {
      const startScreen = document.getElementById('start-screen');
      const loaderContent = document.getElementById('loader-content');
      const progressBar = document.getElementById('progress-bar');
      const statusMsg = document.getElementById('status-msg');
      const quoteBubble = document.getElementById('quote-bubble');
      const scanlines = document.getElementById('scanlines');
      const body = document.body;
      const flash = document.getElementById('flash-overlay');
      const ghost = document.getElementById('ghost-wojak');

      if (startScreen.classList.contains('hidden')) return;

      startScreen.classList.add('hidden');
      loaderContent.classList.remove('hidden');

      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      function playAmbient() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(40, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();

        setInterval(() => {
          const ping = audioCtx.createOscillator();
          const pingGain = audioCtx.createGain();
          ping.frequency.setValueAtTime(880 + Math.random() * 400, audioCtx.currentTime);
          pingGain.gain.setValueAtTime(0.01, audioCtx.currentTime);
          pingGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
          ping.connect(pingGain);
          pingGain.connect(audioCtx.destination);
          ping.start();
          ping.stop(audioCtx.currentTime + 1);
        }, 3000);
      }
      playAmbient();

      let progress = 0;
      const interval = setInterval(() => {
        progress += Math.random() * 1.5;
        if (progress > 100) {
          progress = 100;
          clearInterval(interval);
          statusMsg.innerText = "FRONT LINE REACHED.";
        }
        progressBar.style.width = progress + '%';

        if (Math.random() < 0.05) triggerMortar();
        if (Math.random() < 0.03) popPepe();
        if (Math.random() < 0.01) slideSign();

        if (Math.floor(progress) % 15 === 0) {
          statusMsg.innerText = statusMessages[Math.floor(progress/15) % statusMessages.length];
        }

        if (Math.random() < 0.03) showQuote();
      }, 100);

      function triggerMortar() {
        body.classList.add('shake');
        flash.style.opacity = '0.4';
        ghost.style.opacity = '0.15';
        
        const thump = audioCtx.createOscillator();
        const thumpGain = audioCtx.createGain();
        thump.frequency.setValueAtTime(100, audioCtx.currentTime);
        thump.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        thumpGain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        thumpGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
        thump.connect(thumpGain);
        thumpGain.connect(audioCtx.destination);
        thump.start();
        thump.stop(audioCtx.currentTime + 0.5);

        setTimeout(() => {
          body.classList.remove('shake');
          flash.style.opacity = '0';
          ghost.style.opacity = '0';
        }, 400);

        spawnCoins();
      }

      function showQuote() {
        quoteBubble.innerText = quotes[Math.floor(Math.random() * quotes.length)];
        quoteBubble.style.opacity = '1';
        scanlines.classList.add('glitch-active');
        
        setTimeout(() => { 
          quoteBubble.style.opacity = '0'; 
          scanlines.classList.remove('glitch-active');
        }, 1500);
      }

      function popPepe() {
        const side = Math.random() > 0.5 ? 'pepe-left' : 'pepe-right';
        const el = document.getElementById(side);
        el.style.bottom = '-10px';
        setTimeout(() => { el.style.bottom = '-100px'; }, 1200);
      }

      function slideSign() {
        const sign = document.getElementById('few-sign');
        sign.style.left = '5%';
        setTimeout(() => { sign.style.left = '-400px'; }, 3000);
      }

      function spawnCoins() {
        for(let i=0; i<10; i++) {
          const coin = document.createElement('div');
          coin.className = 'coin';
          coin.innerHTML = '🪙';
          coin.style.left = (50 + (Math.random() * 20 - 10)) + '%';
          coin.style.top = '50%';
          document.body.appendChild(coin);
          
          const angle = Math.random() * Math.PI * 2;
          const velocity = 5 + Math.random() * 10;
          let x = 0, y = 0, vy = -velocity, vx = Math.cos(angle) * (Math.random() * 5);
          
          const anim = setInterval(() => {
            x += vx; y += vy; vy += 0.5;
            coin.style.transform = `translate(${x}px, ${y}px) rotate(${y*2}deg)`;
            if (y > window.innerHeight) { clearInterval(anim); coin.remove(); }
          }, 16);
        }
      }
    }
  </script>
</body></html>
