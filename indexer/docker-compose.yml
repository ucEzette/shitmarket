version: '3.9'

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: shitmarket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shitmarket
      POSTGRES_USER: shitmarket
      POSTGRES_PASSWORD: shitmarket
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U shitmarket -d shitmarket']
      interval: 5s
      timeout: 5s
      retries: 10

  # ── PgBouncer (connection pooling) ────────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: shitmarket-pgbouncer
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://shitmarket:shitmarket@postgres:5432/shitmarket
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 25
      SERVER_RESET_QUERY: DISCARD ALL
    ports:
      - '6432:5432'
    depends_on:
      postgres:
        condition: service_healthy

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: shitmarket-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1000
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # ── ShitMarket Indexer ────────────────────────────────────────────────────────
  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shitmarket-indexer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Use PgBouncer (port 6432) instead of direct Postgres connection
      DATABASE_URL: postgresql://shitmarket:shitmarket@pgbouncer:6432/shitmarket
      REDIS_URL: redis://redis:6379
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      SOLANA_SECONDARY_RPC_URL: ${SOLANA_SECONDARY_RPC_URL:-}
      SOLANA_WS_URL: ${SOLANA_WS_URL:-wss://api.mainnet-beta.solana.com}
      PROGRAM_ID: ${PROGRAM_ID}
      KEEPER_PRIVATE_KEY: ${KEEPER_PRIVATE_KEY}
      BIRDEYE_API_KEY: ${BIRDEYE_API_KEY:-}
      PYTH_FEED_MAPPING: ${PYTH_FEED_MAPPING:-{}}
      REST_API_PORT: 3001
      WS_PORT: 3002
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - '3001:3001'  # REST API
      - '3002:3002'  # WebSocket
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Prometheus (metrics collection) ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: shitmarket-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - '9090:9090'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'

  # ── Grafana (dashboards) ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: shitmarket-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - '3030:3000'
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
