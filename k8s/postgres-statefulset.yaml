# ── PostgreSQL Primary StatefulSet ──────────────────────────────
# For production, use a managed DB (RDS, CloudSQL, etc) instead.
# This is for self-hosted dev/staging environments only.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: shitmarket
  labels:
    app: postgres
    role: primary
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      role: primary
  template:
    metadata:
      labels:
        app: postgres
        role: primary
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: pgport
          env:
            - name: POSTGRES_USER
              value: "shitmarket"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shitmarket-secrets
                  key: db-password
            - name: POSTGRES_DB
              value: "shitmarket"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          args:
            - "-c"
            - "max_connections=200"
            - "-c"
            - "shared_buffers=512MB"
            - "-c"
            - "work_mem=16MB"
            - "-c"
            - "maintenance_work_mem=128MB"
            - "-c"
            - "effective_cache_size=1536MB"
            - "-c"
            - "wal_level=replica"
            - "-c"
            - "max_wal_senders=5"
            - "-c"
            - "hot_standby=on"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "shitmarket"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "shitmarket"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
        storageClassName: standard
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: shitmarket
  labels:
    app: postgres
    role: primary
spec:
  selector:
    app: postgres
    role: primary
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
